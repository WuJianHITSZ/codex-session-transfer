  <rect x="170" y="248" width="190" height="74" rx="18" fill="#F3F7FF"/>
  <text x="196" y="294" fill="#3F6597" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">journal manifest</text>
