  <text x="72" y="94" fill="#1C355B" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Step 5. Restore from Logged Migration States</text>
  <text x="72" y="130" fill="#617693" font-family="Segoe UI, Arial, sans-serif" font-size="18">Migration journals preserve checkpoints so Host B can return to any recorded state, not only the latest one.</text>

  <rect x="110" y="214" width="980" height="360" rx="32" fill="#FFFFFF"/>
  <path d="M188 394H1016" stroke="#C7D5EA" stroke-width="10" stroke-linecap="round"/>

