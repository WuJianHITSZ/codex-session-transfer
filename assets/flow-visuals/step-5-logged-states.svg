  <text x="898" y="294" fill="#B3545D" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">restore</text>

  <text x="186" y="518" fill="#20365A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Checkpoint-aware recovery</text>
  <text x="186" y="550" fill="#607692" font-family="Segoe UI, Arial, sans-serif" font-size="18">The workflow is not limited to one all-or-nothing undo. Logged states make migration auditable and selectively reversible.</text>
